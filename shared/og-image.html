<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #09090B;
    color: #FAFAFA;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* Grid pattern background */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,107,53,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,53,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  /* Glow */
  .glow {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: rgba(255, 107, 53, 0.06);
    filter: blur(100px);
    top: -100px;
    right: -100px;
  }
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 60px;
    padding: 0 80px;
    width: 100%;
  }
  .left {
    flex: 1;
  }
  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #FF6B35;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 52px;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 12px;
  }
  h1 span { color: #FF6B35; }
  .subtitle {
    font-size: 20px;
    color: #A1A1AA;
    line-height: 1.5;
    margin-bottom: 28px;
  }
  .stats {
    display: flex;
    gap: 24px;
  }
  .stat {
    text-align: center;
    padding: 12px 20px;
    border-radius: 10px;
    border: 1px solid #27272A;
    background: #111113;
  }
  .stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    color: #FF6B35;
  }
  .stat-lbl {
    font-size: 11px;
    color: #71717A;
    margin-top: 2px;
  }
  .right {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
    width: 340px;
  }
  .dept {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid #27272A;
    background: #18181B;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .dept-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #6ABF69;
    flex-shrink: 0;
  }
  .dept-name { flex: 1; color: #FAFAFA; }
  .dept-badge {
    font-size: 10px;
    color: #6ABF69;
    border: 1px solid rgba(106,191,105,0.3);
    background: rgba(106,191,105,0.08);
    padding: 2px 8px;
    border-radius: 100px;
  }
  .url {
    position: absolute;
    bottom: 32px;
    left: 80px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: #71717A;
  }
  .url span { color: #FF6B35; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="content">
    <div class="left">
      <div class="label">Company Architecture</div>
      <h1><span>Zero2Claude</span>.dev</h1>
      <div class="subtitle">One human, multiple AI agents,<br>200+ students</div>
      <div class="stats">
        <div class="stat">
          <div class="stat-val">147</div>
          <div class="stat-lbl">Lessons</div>
        </div>
        <div class="stat">
          <div class="stat-val">15</div>
          <div class="stat-lbl">AI Skills</div>
        </div>
        <div class="stat">
          <div class="stat-val">7</div>
          <div class="stat-lbl">Departments</div>
        </div>
      </div>
    </div>
    <div class="right">
      <div class="dept"><span class="dept-dot"></span><span class="dept-name">R&D / Product</span><span class="dept-badge">Active</span></div>
      <div class="dept"><span class="dept-dot"></span><span class="dept-name">DevOps</span><span class="dept-badge">Active</span></div>
      <div class="dept"><span class="dept-dot"></span><span class="dept-name">Analytics</span><span class="dept-badge">Active</span></div>
      <div class="dept"><span class="dept-dot"></span><span class="dept-name">Marketing</span><span class="dept-badge">Active</span></div>
      <div class="dept"><span class="dept-dot"></span><span class="dept-name">Community</span><span class="dept-badge">Active</span></div>
      <div class="dept"><span class="dept-dot"></span><span class="dept-name">Revenue</span><span class="dept-badge">Active</span></div>
      <div class="dept"><span class="dept-dot"></span><span class="dept-name">Legal</span><span class="dept-badge">Active</span></div>
    </div>
  </div>
  <div class="url"><span>team</span>.zero2claude.dev</div>
</body>
</html>

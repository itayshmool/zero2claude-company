<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEO Dashboard — Login</title>
<link rel="stylesheet" href="../shared/style.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    text-align: center;
    max-width: 420px;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .login-card::before {
    content: '';
    position: absolute;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: rgba(255, 107, 53, 0.06);
    filter: blur(60px);
    pointer-events: none;
  }
  .login-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  .login-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .login-title span { color: var(--orange); }
  .login-subtitle {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 32px;
  }
  .google-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 28px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-decoration: none;
  }
  .google-btn:hover {
    border-color: var(--border-light);
    background: var(--card-hover);
  }
  .google-btn svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }
  .error-msg {
    margin-top: 20px;
    padding: 10px 16px;
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.3);
    border-radius: 8px;
    color: var(--red);
    font-size: 13px;
    display: none;
  }
  .error-msg.visible { display: block; }
  .login-footer {
    margin-top: 32px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .login-footer a { color: var(--text-muted); }
  .login-footer a:hover { color: var(--orange); }
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    z-index: 100;
  }
  .theme-toggle:hover {
    border-color: var(--border-light);
    background: var(--card-hover);
  }
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode"></button>
<div class="login-card">
  <div class="login-icon">🏢</div>
  <div class="login-title"><span>Zero2Claude</span> CEO</div>
  <div class="login-subtitle">Company dashboard access</div>

  <a href="" class="google-btn" id="googleBtn">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Sign in with Google
  </a>

  <div class="error-msg" id="errorMsg"></div>

  <div class="login-footer">
    <a href="../">team.zero2claude.dev</a>
  </div>
</div>

<script>
  // Theme toggle (shared localStorage key with main site)
  const toggle = document.getElementById('themeToggle');
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    toggle.textContent = '\u2600\uFE0F';
  } else {
    toggle.textContent = '\uD83C\uDF19';
  }
  toggle.addEventListener('click', () => {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) {
      document.documentElement.removeAttribute('data-theme');
      toggle.textContent = '\uD83C\uDF19';
      localStorage.setItem('theme', 'dark');
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
      toggle.textContent = '\u2600\uFE0F';
      localStorage.setItem('theme', 'light');
    }
  });

  const API_BASE = 'https://zero2claude-company-api.onrender.com';

  // Set the Google button href
  document.getElementById('googleBtn').href = API_BASE + '/auth/google';

  // Check for error in URL
  const params = new URLSearchParams(window.location.search);
  const error = params.get('error');
  if (error) {
    const msg = document.getElementById('errorMsg');
    const messages = {
      unauthorized: 'Access restricted to the CEO. Please sign in with the authorized account.',
      auth_failed: 'Authentication failed. Please try again.',
      no_code: 'Authentication interrupted. Please try again.',
    };
    msg.textContent = messages[error] || 'An error occurred. Please try again.';
    msg.classList.add('visible');
    // Clean URL
    history.replaceState(null, '', window.location.pathname);
  }

  // Check if already authenticated
  fetch(API_BASE + '/api/me', { credentials: 'include' })
    .then(r => { if (r.ok) window.location.href = './'; })
    .catch(() => {});
</script>
</body>
</html>
